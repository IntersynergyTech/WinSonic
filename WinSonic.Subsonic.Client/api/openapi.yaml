  /rest/getTranscodeStream:
    get:
      description: "Returns a transcoded media stream. Clients should not try to reconstruct\
        \ the `transcodeParams`. Instead, they must use the `transcodeParams` provided\
        \ in the response of the `getTranscodeDecision` endpoint."
      operationId: getTranscodeStream
      parameters:
      - description: The ID of the media.
        in: query
        name: mediaId
        required: true
        schema:
          type: string
      - description: The type of the media.
        in: query
        name: mediaType
        required: true
        schema:
          enum:
          - song
          - podcast
          type: string
      - description: The time offset in seconds from which to start transcoding.
        in: query
        name: offset
        required: false
        schema:
          default: 0
          type: integer
      - description: Server-specific transcoding parameters. This should be obtained
          from the `getTranscodeDecision` endpoint.
        in: query
        name: transcodeParams
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                format: binary
                type: string
          description: The transcoded media stream.
        "400":
          description: Bad Request - The request was malformed or invalid.
        "401":
          description: Unauthorized - Authentication failed.
        "404":
          description: Not Found - The requested track does not exist.
        "500":
          description: Internal Server Error - The server encountered an error during
            transcoding.
      summary: Get Transcoded Stream
      tags:
      - Transcoding
