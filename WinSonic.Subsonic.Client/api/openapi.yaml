          type: number
        fallbackGain:
          description: An optional fallback gain that clients should apply when the
            corresponding gain value is missing. (Can be computed from the tracks
            or exposed as an user setting.)
          type: number
      type: object
    GenericMediaType:
      description: "The generic type of media [music/podcast/audiobook/video]"
