  /rest/updateUser:
    get:
      description: Modifies an existing user on the server.
      externalDocs:
        description: updateUser
        url: https://opensubsonic.netlify.app/docs/endpoints/updateuser/
      operationId: updateUser
      parameters:
      - description: The name of the user.
        in: query
        name: username
        required: true
        schema:
          type: string
      - description: "The password of the user, either in clear text of hex-encoded\
          \ (see above)."
        in: query
        name: password
        required: true
        schema:
          type: string
      - description: The email address of the user.
        in: query
        name: email
        required: false
        schema:
          type: string
      - description: Whether the user is authenicated in LDAP.
        in: query
        name: ldapAuthenticated
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is administrator.
        in: query
        name: adminRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to change personal settings and password.
        in: query
        name: settingsRole
        required: false
        schema:
          default: true
          type: boolean
      - description: Whether the user is allowed to play files.
        in: query
        name: streamRole
        required: false
        schema:
          default: true
          type: boolean
      - description: Whether the user is allowed to play files in jukebox mode.
        in: query
        name: jukeboxRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to download files.
        in: query
        name: downloadRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to upload files.
        in: query
        name: uploadRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to change cover art and tags.
        in: query
        name: coverArtRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to create and edit comments and ratings.
        in: query
        name: commentRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to administrate Podcasts.
        in: query
        name: podcastRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to share files with anyone.
        in: query
        name: shareRole
        required: false
        schema:
          default: false
          type: boolean
      - description: (Since 1.15.0) Whether the user is allowed to start video conversions.
        in: query
        name: videoConversionRole
        required: false
        schema:
          default: false
          type: boolean
      - description: (Since 1.12.0) IDs of the music folders the user is allowed access
          to. Include the parameter once for each folder.
        explode: true
        in: query
        name: musicFolderId
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: "(Since 1.13.0) The maximum bit rate (in Kbps) for the user.\
          \ Audio streams of higher bit rates are automatically downsampled to this\
          \ bit rate. Legal values: 0 (no limit), 32, 40, 48, 56, 64, 80, 96, 112,\
          \ 128, 160, 192, 224, 256, 320."
        in: query
        name: maxBitRate
        required: false
        schema:
          enum:
          - 0
          - 32
          - 40
          - 48
          - 56
          - 64
          - 80
          - 96
          - 112
          - 128
          - 160
          - 192
          - 224
          - 256
          - 320
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Modifies an existing user on the server.
      tags:
      - User Management
    post:
      description: |-
        Modifies an existing user on the server.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      operationId: postUpdateUser
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postUpdateUser_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Modifies an existing user on the server.
      tags:
      - User Management
components:
  parameters: {}
  responses:
    EmptySubsonicResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubsonicResponse"
      description: Successful or failed response
    HTTPFormPostNotSupported:
      description: HTTP form POST (`formPost`) Extension not supported
    BinaryResponse:
      content:
        application/binary:
          schema:
            format: binary
            type: string
        text/xml:
          schema:
            description: "Error response TODO: TO BE DESCRIBED"
            type: object
      description: Success (binary) or error (xml) response
    TranscodeDecisionResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/getTranscodeDecision_200_response"
        application/xml:
          schema:
            $ref: "#/components/schemas/getTranscodeDecision_200_response"
      description: A transcode decision.
  schemas:
    SubsonicError:
      example:
        code: 42
        message: Authentication mechanism not supported. Use API keys
        helpUrl: https://example.org/users/apiKey
      externalDocs:
        description: Error
        url: https://opensubsonic.netlify.app/docs/responses/error/
      properties:
        code:
          description: |-
            The error code.
            * 0: A generic error.
            * 10: Required parameter is missing.
            * 20: Incompatible Subsonic REST protocol version. Client must upgrade.
            * 30: Incompatible Subsonic REST protocol version. Server must upgrade.
            * 40: Wrong username or password.
            * 41: Token authentication not supported for LDAP users.
            * 42: Provided authentication mechanism not supported.
            * 43: Multiple conflicting authentication mechanisms provided.
            * 44: Invalid API key.
            * 50: User is not authorized for the given operation.
            * 60: The trial period for the Subsonic server is over. Please upgrade to Subsonic Premium. Visit subsonic.org for details.
            * 70: The requested data was not found.
          enum:
          - 0
          - 10
          - 20
          - 30
          - 40
          - 41
          - 42
          - 43
          - 44
          - 50
          - 60
          - 70
          type: integer
        message:
          description: The optional error message
          type: string
        helpUrl:
          description: "A URL (documentation, configuration, etc) which may provide\
            \ additional context for the error)"
          type: string
      required:
      - code
      type: object
    SubsonicBaseResponse:
      properties:
        version:
          description: The server supported Subsonic API version.
          type: string
        type:
          description: "The server actual name. [Ex: Navidrome or gonic]"
          type: string
        serverVersion:
          description: The server version.
          type: string
        openSubsonic:
          description: Must return true if the server support OpenSubsonic API v1
          type: boolean
      required:
      - openSubsonic
      - serverVersion
      - type
      - version
      type: object
    SubsonicSuccessResponse:
      allOf:
      - $ref: "#/components/schemas/SubsonicBaseResponse"
      - externalDocs:
          description: SubsonicResponse
          url: https://opensubsonic.netlify.app/docs/responses/subsonic-response/
        properties:
          status:
            description: The command result. `ok`
            enum:
            - ok
            type: string
        required:
        - status
        type: object
      example:
        version: version
        type: type
        serverVersion: serverVersion
        openSubsonic: true
        status: ok
    SubsonicFailureResponse:
      allOf:
      - $ref: "#/components/schemas/SubsonicBaseResponse"
      - externalDocs:
          description: SubsonicResponse
          url: https://opensubsonic.netlify.app/docs/responses/subsonic-response/
        properties:
          status:
            description: The command result. `failed`
            enum:
            - failed
            type: string
          error:
            $ref: "#/components/schemas/Error"
        required:
        - error
        - status
        type: object
    SubsonicResponse:
      description: Common answer wrapper.
      example:
        subsonic-response:
          version: version
          type: type
          serverVersion: serverVersion
          openSubsonic: true
          status: ok
      externalDocs:
        description: SubsonicResponse
        url: https://opensubsonic.netlify.app/docs/responses/subsonic-response/
      properties:
        subsonic-response:
          $ref: "#/components/schemas/SubsonicResponse_subsonic_response"
      type: object
    ItemGenre:
      description: A genre returned in list of genres for an item.
      example:
        name: name
      externalDocs:
        description: ItemGenre
        url: https://opensubsonic.netlify.app/docs/responses/itemgenre/
      properties:
        name:
          description: Genre name
          type: string
      required:
      - name
      type: object
    ArtistID3:
