openapi: 3.0.0
info:
  description: OpenSubsonic API documentation.
  title: OpenSubsonic API
  version: 1.16.1
servers:
- url: "{url}"
  variables:
    url:
      default: https://example-opensubsonic-compatible-server.com
      description: The URL of the OpenSubsonic server.
security:
- apiKeyAuth: []
  protocolVersion: []
  clientName: []
  format: []
- username: []
  legacyPassword: []
  protocolVersion: []
  clientName: []
  format: []
- username: []
  token: []
  salt: []
  protocolVersion: []
  clientName: []
  format: []
tags:
- name: System
- name: User Management
- name: Media Library Scanning
- name: Searching
- name: Browsing
- name: Playlists
- name: Lists
- name: Media Retrieval
- name: Media Annotation
- name: Sharing
- name: Bookmarks
- name: Internet Radio
- name: Podcast
- name: Jukebox
- name: Chat
- name: Transcoding
- name: Extension
- name: Addition
- name: Change
- name: Clarification
paths:
  /rest/addChatMessage:
    get:
      description: Adds a message to the chat log.
      externalDocs:
        description: addChatMessage
        url: https://opensubsonic.netlify.app/docs/endpoints/addchatmessage/
      operationId: getAddChatMessage
      parameters:
      - description: The chat message.
        in: query
        name: message
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Adds a message to the chat log.
      tags:
      - Chat
    post:
      description: |-
        Adds a message to the chat log.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: addChatMessage
        url: https://opensubsonic.netlify.app/docs/endpoints/addchatmessage/
      operationId: postAddChatMessage
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postAddChatMessage_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Adds a message to the chat log.
      tags:
      - Chat
  /rest/changePassword:
    get:
      description: "Changes the password of an existing user on the server, using\
        \ the following parameters. You can only change your own password unless you\
        \ have admin privileges."
      externalDocs:
        description: changePassword
        url: https://opensubsonic.netlify.app/docs/endpoints/changepassword/
      operationId: changePassword
      parameters:
      - description: The name of the user which should change its password.
        in: query
        name: username
        required: true
        schema:
          type: string
      - description: "The new password of the new user, either in clear text of hex-encoded\
          \ (see above)."
        in: query
        name: password
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Changes the password of an existing user on the server.
      tags:
      - User Management
    post:
      description: |-
        Changes the password of an existing user on the server, using the following parameters. You can only change your own password unless you have admin privileges.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: changePassword
        url: https://opensubsonic.netlify.app/docs/endpoints/changepassword/
      operationId: postChangePassword
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postChangePassword_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Changes the password of an existing user on the server.
      tags:
      - User Management
  /rest/createBookmark:
    get:
      description: Creates or updates a bookmark (a position within a media file).
        Bookmarks are personal and not visible to other users.
      externalDocs:
        description: createBookmark
        url: https://opensubsonic.netlify.app/docs/endpoints/createbookmark/
      operationId: createBookmark
      parameters:
      - description: ID of the media file to bookmark. If a bookmark already exists
          for this file it will be overwritten.
        in: query
        name: id
        required: true
        schema:
          type: string
      - description: The position (in milliseconds) within the media file.
        in: query
        name: position
        required: true
        schema:
          type: integer
      - description: A user-defined comment.
        in: query
        name: comment
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Creates or updates a bookmark.
      tags:
      - Bookmarks
    post:
      description: |-
        Creates or updates a bookmark (a position within a media file). Bookmarks are personal and not visible to other users.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: createBookmark
        url: https://opensubsonic.netlify.app/docs/endpoints/createbookmark/
      operationId: postCreateBookmark
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postCreateBookmark_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Creates or updates a bookmark.
      tags:
      - Bookmarks
  /rest/createInternetRadioStation:
    get:
      description: Adds a new internet radio station. Only users with admin privileges
        are allowed to call this method.
      externalDocs:
        description: createInternetRadioStation
        url: https://opensubsonic.netlify.app/docs/endpoints/createinternetradiostation/
      operationId: createInternetRadioStation
      parameters:
      - description: The stream URL for the station.
        in: query
        name: streamUrl
        required: true
        schema:
          type: string
      - description: The station name.
        in: query
        name: name
        required: true
        schema:
          type: string
      - description: The home page URL for the station.
        in: query
        name: homepageUrl
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Adds a new internet radio station.
      tags:
      - Internet Radio
    post:
      description: |-
        Adds a new internet radio station. Only users with admin privileges are allowed to call this method.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: createInternetRadioStation
        url: https://opensubsonic.netlify.app/docs/endpoints/createinternetradiostation/
      operationId: postCreateInternetRadioStation
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postCreateInternetRadioStation_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Adds a new internet radio station.
      tags:
      - Internet Radio
  /rest/createPlaylist:
    get:
      description: Creates (or updates) a playlist.
      externalDocs:
        description: createPlaylist
        url: https://opensubsonic.netlify.app/docs/endpoints/createplaylist/
      operationId: createPlaylist
      parameters:
      - description: The playlist ID. Required if updating an existing playlist.
        in: query
        name: playlistId
        required: false
        schema:
          type: string
      - description: The human-readable name of the playlist. Required if creating
          a new playlist.
        in: query
        name: name
        required: false
        schema:
          type: string
      - description: ID of a song in the playlist. Use one `songId` parameter for
          each song in the playlist.
        explode: true
        in: query
        name: songId
        schema:
          items:
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePlaylistResponse"
          description: Successful or failed response
      summary: Creates (or updates) a playlist.
      tags:
      - Playlists
    post:
      description: |-
        Creates (or updates) a playlist.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: createPlaylist
        url: https://opensubsonic.netlify.app/docs/endpoints/createplaylist/
      operationId: postCreatePlaylist
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postCreatePlaylist_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePlaylistResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Creates (or updates) a playlist.
      tags:
      - Playlists
  /rest/createPodcastChannel:
    get:
      description: "Adds a new Podcast channel. Note: The user must be authorized\
        \ for Podcast administration (see Settings > Users > User is allowed to administrate\
        \ Podcasts)."
      externalDocs:
        description: createPodcastChannel
        url: https://opensubsonic.netlify.app/docs/endpoints/createpodcastchannel/
      operationId: createPodcastChannel
      parameters:
      - description: The URL of the Podcast to add.
        in: query
        name: url
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Adds a new Podcast channel.
      tags:
      - Podcast
    post:
      description: |-
        Adds a new Podcast channel. Note: The user must be authorized for Podcast administration (see Settings > Users > User is allowed to administrate Podcasts).

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: createPodcastChannel
        url: https://opensubsonic.netlify.app/docs/endpoints/createpodcastchannel/
      operationId: postCreatePodcastChannel
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postCreatePodcastChannel_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Adds a new Podcast channel.
      tags:
      - Podcast
  /rest/createShare:
    get:
      description: "Creates a public URL that can be used by anyone to stream music\
        \ or video from the server. The URL is short and suitable for posting on Facebook,\
        \ Twitter etc. Note: The user must be authorized to share (see Settings >\
        \ Users > User is allowed to share files with anyone). Since 1.6.0."
      externalDocs:
        description: createShare
        url: https://opensubsonic.netlify.app/docs/endpoints/createshare/
      operationId: createShare
      parameters:
      - description: "ID of a song, album or video to share. Use one id parameter\
          \ for each entry to share."
        explode: true
        in: query
        name: id
        required: true
        schema:
          items:
            type: string
          type: array
        style: form
      - description: A user-defined description that will be displayed to people visiting
          the shared media.
        in: query
        name: description
        required: false
        schema:
          type: string
      - description: The time at which the share expires. Given as milliseconds since
          1970.
        in: query
        name: expires
        required: false
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSharesResponse"
          description: Successful or failed response
      summary: Creates a public URL that can be used by anyone to stream music or
        video from the server.
      tags:
      - Sharing
    post:
      description: |-
        Creates a public URL that can be used by anyone to stream music or video from the server. The URL is short and suitable for posting on Facebook, Twitter etc. Note: The user must be authorized to share (see Settings > Users > User is allowed to share files with anyone). Since 1.6.0.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`).
      externalDocs:
        description: createShare
        url: https://opensubsonic.netlify.app/docs/endpoints/createshare/
      operationId: postCreateShare
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postCreateShare_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSharesResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Creates a public URL that can be used by anyone to stream music or
        video from the server.
      tags:
      - Sharing
  /rest/createUser:
    get:
      description: Creates a new user on the server.
      externalDocs:
        description: createUser
        url: https://opensubsonic.netlify.app/docs/endpoints/createuser/
      operationId: createUser
      parameters:
      - description: The name of the new user.
        in: query
        name: username
        required: true
        schema:
          type: string
      - description: "The password of the new user, either in clear text of hex-encoded\
          \ (see above)."
        in: query
        name: password
        required: true
        schema:
          type: string
      - description: The email address of the new user.
        in: query
        name: email
        required: true
        schema:
          type: string
      - description: Whether the user is authenticated in LDAP.
        in: query
        name: ldapAuthenticated
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is administrator.
        in: query
        name: adminRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to change personal settings and password.
        in: query
        name: settingsRole
        required: false
        schema:
          default: true
          type: boolean
      - description: Whether the user is allowed to play files.
        in: query
        name: streamRole
        required: false
        schema:
          default: true
          type: boolean
      - description: Whether the user is allowed to play files in jukebox mode.
        in: query
        name: jukeboxRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to download files.
        in: query
        name: downloadRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to upload files.
        in: query
        name: uploadRole
        required: false
        schema:
          default: false
          type: boolean
      - description: "Whether the user is allowed to create and delete playlists.\
          \ Since 1.8.0, changing this role has no effect."
        in: query
        name: playlistRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to change cover art and tags.
        in: query
        name: coverArtRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to create and edit comments and ratings.
        in: query
        name: commentRole
        required: false
        schema:
          default: false
          type: boolean
      - description: Whether the user is allowed to administrate Podcasts.
        in: query
        name: podcastRole
        required: false
        schema:
          default: false
          type: boolean
      - description: (Since 1.8.0) Whether the user is allowed to share files with
          anyone.
        in: query
        name: shareRole
        required: false
        schema:
          default: false
          type: boolean
      - description: (Since 1.15.0) Whether the user is allowed to start video conversions.
        in: query
        name: videoConversionRole
        required: false
        schema:
          default: false
          type: boolean
      - description: (Since 1.12.0) IDs of the music folders the user is allowed access
          to. Include the parameter once for each folder. Default all folders.
        explode: true
        in: query
        name: musicFolderId
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Creates a new user on the server.
      tags:
      - User Management
    post:
      description: |-
        Creates a new user on the server.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: createUser
        url: https://opensubsonic.netlify.app/docs/endpoints/createuser/
      operationId: postCreateUser
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postCreateUser_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Creates a new user on the server.
      tags:
      - User Management
  /rest/deleteBookmark:
    get:
      description: Deletes a bookmark (a position within a media file). Bookmarks
        are personal and not visible to other users.
      externalDocs:
        description: deleteBookmark
        url: https://opensubsonic.netlify.app/docs/endpoints/deletebookmark/
      operationId: deleteBookmark
      parameters:
      - description: ID of the media file for which to delete the bookmark. Other
          users’ bookmarks are not affected.
        in: query
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Deletes a bookmark.
      tags:
      - Bookmarks
    post:
      description: |-
        Deletes a bookmark (a position within a media file). Bookmarks are personal and not visible to other users.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: deleteBookmark
        url: https://opensubsonic.netlify.app/docs/endpoints/deletebookmark/
      operationId: postDeleteBookmark
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postDeleteBookmark_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Deletes a bookmark.
      tags:
      - Bookmarks
  /rest/deleteInternetRadioStation:
    get:
      description: Deletes an existing internet radio station. Only users with admin
        privileges are allowed to call this method.
      externalDocs:
        description: deleteInternetRadioStation
        url: https://opensubsonic.netlify.app/docs/endpoints/deleteinternetradiostation/
      operationId: deleteInternetRadioStation
      parameters:
      - description: The ID for the station.
        in: query
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Deletes an existing internet radio station.
      tags:
      - Internet Radio
    post:
      description: |-
        Deletes an existing internet radio station. Only users with admin privileges are allowed to call this method.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: deleteInternetRadioStation
        url: https://opensubsonic.netlify.app/docs/endpoints/deleteinternetradiostation/
      operationId: postDeleteInternetRadioStation
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postDeleteInternetRadioStation_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Deletes an existing internet radio station.
      tags:
      - Internet Radio
  /rest/deletePlaylist:
    get:
      description: Deletes a saved playlist.
      externalDocs:
        description: deletePlaylist
        url: https://opensubsonic.netlify.app/docs/endpoints/deleteplaylist/
      operationId: deletePlaylist
      parameters:
      - description: "ID of the playlist to delete, as obtained by `getPlaylists`."
        in: query
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Deletes a saved playlist.
      tags:
      - Playlists
    post:
      description: |-
        Deletes a saved playlist.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: deletePlaylist
        url: https://opensubsonic.netlify.app/docs/endpoints/deleteplaylist/
      operationId: postDeletePlaylist
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postDeletePlaylist_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Deletes a saved playlist.
      tags:
      - Playlists
  /rest/deletePodcastChannel:
    get:
      description: "Deletes a Podcast channel. Note: The user must be authorized for\
        \ Podcast administration (see Settings > Users > User is allowed to administrate\
        \ Podcasts)."
      externalDocs:
        description: deletePodcastChannel
        url: https://opensubsonic.netlify.app/docs/endpoints/deletepodcastchannel/
      operationId: deletePodcastChannel
      parameters:
      - description: The ID of the Podcast channel to delete.
        in: query
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Deletes a Podcast channel.
      tags:
      - Podcast
    post:
      description: |-
        Deletes a Podcast channel. Note: The user must be authorized for Podcast administration (see Settings > Users > User is allowed to administrate Podcasts).

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: deletePodcastChannel
        url: https://opensubsonic.netlify.app/docs/endpoints/deletepodcastchannel/
      operationId: postDeletePodcastChannel
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postDeletePodcastChannel_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Deletes a Podcast channel.
      tags:
      - Podcast
  /rest/deletePodcastEpisode:
    get:
      description: "Deletes a Podcast episode. Note: The user must be authorized for\
        \ Podcast administration (see Settings > Users > User is allowed to administrate\
        \ Podcasts)."
      externalDocs:
        description: deletePodcastEpisode
        url: https://opensubsonic.netlify.app/docs/endpoints/deletepodcastepisode/
      operationId: deletePodcastEpisode
      parameters:
      - description: The ID of the Podcast episode to delete.
        in: query
        name: id
        required: true
        schema:
          type: string
      responses:
