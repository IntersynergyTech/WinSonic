    get:
      description: OpenSubsonic extension name `playbackReport` (As returned by `getOpenSubsonicExtensions`).
        Reports playback timeline state for a song.
      externalDocs:
        description: reportPlayback
        url: https://opensubsonic.netlify.app/docs/endpoints/reportplayback/
      operationId: reportPlayback
      parameters:
      - description: The ID of the media.
        in: query
        name: mediaId
        required: true
        schema:
          type: string
      - description: The type of the media.
        in: query
        name: mediaType
        required: true
        schema:
          enum:
          - song
          - podcast
          type: string
      - description: The playback position in milliseconds.
        in: query
        name: positionMs
        required: true
        schema:
          minimum: 0
          type: integer
      - description: Playback state.
        in: query
        name: state
        required: true
        schema:
          enum:
          - starting
          - playing
          - paused
          - stopped
          type: string
      - description: Playback speed multiplier.
        in: query
        name: playbackRate
        required: false
        schema:
          default: 1.0
          format: float
          type: number
      - description: "If true, server should only update now-playing display/state\
          \ and should not trigger scrobble/playcount side effects."
        in: query
        name: ignoreScrobble
        required: false
        schema:
          default: false
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "404":
          description: Extension not supported.
      summary: Reports playback timeline state for a song.
      tags:
      - Media Annotation
