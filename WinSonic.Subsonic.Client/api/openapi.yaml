        description: getLyricsBySongId
        url: https://opensubsonic.netlify.app/docs/endpoints/getlyricsbysongid/
      operationId: getLyricsBySongId
      parameters:
      - description: The track ID.
        in: query
        name: id
        required: true
        schema:
          type: string
      - description: "When true, the response includes cueLine arrays with word/syllable-level\
          \ timing data, required cue byteStart and byteEnd offsets into cueLine.value,\
          \ and non-main kind tracks (translations, pronunciations). When false or\
          \ omitted, only kind=main entries are returned with no cueLine data."
        in: query
        name: enhanced
        required: false
        schema:
          default: false
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLyricsBySongIdResponse"
          description: Successful or failed response
        "404":
          description: Extension not supported.
      summary: "Add support for synchronized lyrics, multiple languages, and retrieval\
        \ by song ID. "
      tags:
      - Media Retrieval
      - Extension
