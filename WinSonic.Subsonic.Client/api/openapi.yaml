      - role
      type: object
    Cue:
      description: A word or syllable cue within a cueLine
      example:
        start: 2
        end: 7
        byteStart: 0
        byteEnd: 0
        value: value
      externalDocs:
        description: Cue
        url: https://opensubsonic.netlify.app/docs/responses/cue/
      properties:
        start:
          description: Start time in milliseconds
          type: integer
        end:
          description: "End time in milliseconds. Within a cueLine, end must be either\
            \ present on all cues or none. When the source provides partial end times,\
            \ servers must fill missing values (e.g., using the next cue's start,\
            \ or the cueLine's end for the final cue). When no cues have end times\
            \ (e.g., Enhanced LRC with start-only timing), end is omitted from all\
            \ cues. This is a documented contract rule; this schema does not enforce\
            \ the all-or-none shape structurally"
          type: integer
        byteStart:
          description: "Required zero-based inclusive UTF-8 byte offset into the parent\
            \ cueLine.value where this cue begins. The parent cueLine must include\
            \ value, and the offsets must be calculated against the final cueLine.value\
            \ with no normalization step"
          minimum: 0
          type: integer
        byteEnd:
          description: "Required zero-based inclusive UTF-8 byte offset into the parent\
            \ cueLine.value where this cue ends. byteStart must be less than or equal\
            \ to byteEnd, the parent cueLine must include value, and the offsets must\
            \ be calculated against the final cueLine.value with no normalization\
            \ step. This schema does not enforce the cross-field ordering constraint\
            \ structurally"
          minimum: 0
          type: integer
        value:
          description: The text of this word or syllable
          type: string
      required:
      - byteEnd
      - byteStart
      - start
      - value
      type: object
    CueLine:
      description: Word/syllable-level timing data for a lyrics line
      example:
        index: 1
        start: 5
        end: 5
        value: value
        agentId: agentId
        cue:
        - start: 2
          end: 7
          byteStart: 0
          byteEnd: 0
          value: value
        - start: 2
          end: 7
          byteStart: 0
          byteEnd: 0
          value: value
      externalDocs:
        description: CueLine
        url: https://opensubsonic.netlify.app/docs/responses/cueline/
      properties:
        index:
          description: Zero-based index into the parent line array this cueLine corresponds
            to
          type: integer
        start:
          description: Start time in milliseconds (may differ from the parent line
            if cues are more precise)
          type: integer
        end:
          description: End time in milliseconds
          type: integer
        value:
          description: Required full text of the line. Nested cue byteStart and byteEnd
            offsets are always calculated against this exact final UTF-8 string
          type: string
        agentId:
          description: "Opaque identifier referencing an agent in the same structuredLyrics\
            \ entry. If the parent structuredLyrics entry includes agents, every cueLine\
            \ in that entry must include agentId, and the value must match exactly\
            \ one agents[].id in that entry. If the parent entry does not include\
            \ agents, cueLines must not include agentId. When multiple cueLines share\
            \ the same index, the cueLine whose referenced agent has role main must\
            \ come first"
          type: string
        cue:
          description: Ordered list of word/syllable cues. Every cue includes required
            byteStart and byteEnd offsets into value
          items:
            $ref: "#/components/schemas/Cue"
          type: array
      required:
      - cue
      - index
      - value
      type: object
    StructuredLyrics:
      description: Structured lyrics
      example:
        lang: lang
        synced: true
        line:
        - value: value
          start: 0.8008281904610115
        - value: value
          start: 0.8008281904610115
        displayArtist: displayArtist
        displayTitle: displayTitle
        offset: 6.027456183070403
        kind: main
        agents:
        - id: id
          role: main
          name: name
        - id: id
          role: main
          name: name
        cueLine:
        - index: 1
          start: 5
          end: 5
          value: value
          agentId: agentId
          cue:
          - start: 2
            end: 7
            byteStart: 0
            byteEnd: 0
            value: value
          - start: 2
            end: 7
            byteStart: 0
            byteEnd: 0
            value: value
        - index: 1
          start: 5
          end: 5
          value: value
          agentId: agentId
          cue:
          - start: 2
            end: 7
            byteStart: 0
            byteEnd: 0
            value: value
          - start: 2
            end: 7
            byteStart: 0
            byteEnd: 0
            value: value
      externalDocs:
        description: StructuredLyrics
        url: https://opensubsonic.netlify.app/docs/responses/structuredlyrics/
      properties:
        lang:
          description: |-
            The lyrics language (ideally ISO 639). If the language is unknown (e.g. lrc file), the server must return `und` (ISO standard) or `xxx` (common value for taggers). Ideally, the server will return lang as an ISO 639 (2/3) code. However, tagged files and external lyrics can come with any value as a potential language code, so clients should take care when displaying lang.

            Furthermore, there is special behavior for the value xxx. While not an ISO code, it is commonly used by taggers and other parsing software. Clients should treat xxx as not having a specified language (equivalent to the und code).
          type: string
        synced:
          description: "True if the lyrics are synced, false otherwise"
          type: boolean
        line:
          description: The actual lyrics. Ordered by start time (synced) or appearance
            order (unsynced)
          items:
            $ref: "#/components/schemas/Line"
          type: array
        displayArtist:
          description: "The artist name to display. This could be the localized name,\
            \ or any other value"
          type: string
        displayTitle:
          description: "The title to display. This could be the song title (localized),\
            \ or any other value"
          type: string
        offset:
          description: "The offset to apply to all lyrics, in milliseconds. Positive\
            \ means lyrics appear sooner, negative means later. If not included, the\
            \ offset must be assumed to be 0"
          type: number
        kind:
          description: "The primary lyric-layer classification for this structuredLyrics\
            \ entry. One of: main (primary vocals for this entry, default if omitted),\
            \ translation (a translation of another lyric layer into another language),\
            \ pronunciation (a phonetic/romanized rendering, e.g. romaji for Japanese,\
            \ pinyin for Chinese). Tracks are independent across kind values; clients\
            \ should not assume 1:1 line or cue alignment between entries. Only returned\
            \ when enhanced=true"
          enum:
          - main
          - translation
          - pronunciation
          type: string
        agents:
          description: "Reusable per-track attribution metadata for cueLine entries.\
            \ When present, agents must contain at least one entry, and each agents[].id\
            \ must be unique within this structuredLyrics entry. Agents are optional\
            \ for simple unattributed single-layer lyrics. When a structuredLyrics\
            \ entry represents multiple vocal agents or layers, it must include agents;\
            \ a single-agent attributed or default entry may also include agents,\
            \ and if it does, exactly one agent must use role main. Agents should\
            \ not be emitted without cueLine data"
          items:
            $ref: "#/components/schemas/Agent"
          minItems: 1
          type: array
        cueLine:
          description: "Word/syllable-level timing data. Each cueLine corresponds\
            \ to a line in this structuredLyrics entry by its index field. Every cueLine\
            \ includes value, and every cue includes byteStart and byteEnd offsets\
            \ into that exact string. If agents is present, every cueLine in the entry\
            \ must include agentId, and each agentId must match exactly one agents[].id\
            \ in that entry. If agents is absent, cueLines must not include agentId.\
            \ Only returned when enhanced=true and synced is true"
          items:
            $ref: "#/components/schemas/CueLine"
          type: array
      required:
      - lang
      - line
      - synced
      type: object
