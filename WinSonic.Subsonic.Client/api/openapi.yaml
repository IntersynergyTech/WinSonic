          minimum: 0
          type: integer
      required:
      - action
      - index
      type: object
    postJukeboxControl_request_oneOf_3:
      properties:
        action:
          description: '''add'' action.'
          enum:
          - add
          type: object
        id:
          description: "ID of song to add to the jukebox playlist. Use multiple id\
            \ parameters to add many songs in the same request. (set is similar to\
