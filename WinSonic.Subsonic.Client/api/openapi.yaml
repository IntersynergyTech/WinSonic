  /rest/hls.m3u8:
    get:
      description: "Creates an HLS (HTTP Live Streaming) playlist used for streaming\
        \ video or audio. HLS is a streaming protocol implemented by Apple and works\
        \ by breaking the overall stream into a sequence of small HTTP-based file\
        \ downloads. It’s supported by iOS and newer versions of Android. This method\
        \ also supports adaptive bitrate streaming, see the bitRate parameter."
      externalDocs:
        description: hls.m3u8
        url: https://opensubsonic.netlify.app/docs/endpoints/hls/
      operationId: hls.m3u8
      parameters:
      - description: A string which uniquely identifies the media file to stream.
        in: query
        name: id
        required: true
        schema:
          type: string
      - description: "If specified, the server will attempt to limit the bitrate to\
          \ this value, in kilobits per second. If this parameter is specified more\
          \ than once, the server will create a variant playlist, suitable for adaptive\
          \ bitrate streaming. The playlist will support streaming at all the specified\
          \ bitrates. The server will automatically choose video dimensions that are\
          \ suitable for the given bitrates. Since 1.9.0 you may explicitly request\
          \ a certain width (480) and height (360) like so: bitRate=1000@480x360"
        in: query
        name: bitRate
        required: false
        schema:
          type: integer
      - description: The ID of the audio track to use. See `getVideoInfo` for how
          to get the list of available audio tracks for a video.
        in: query
        name: audioTrack
        required: false
        schema:
          type: string
      responses:
        "200":
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string
            text/xml:
              schema:
                description: "Error response TODO: TO BE DESCRIBED"
                type: object
          description: Successful or failed response
      summary: Downloads a given media file (HLS).
      tags:
      - Media Retrieval
    post:
      description: |-
        Creates an HLS (HTTP Live Streaming) playlist used for streaming video or audio. HLS is a streaming protocol implemented by Apple and works by breaking the overall stream into a sequence of small HTTP-based file downloads. It’s supported by iOS and newer versions of Android. This method also supports adaptive bitrate streaming, see the bitRate parameter.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: hls.m3u8
        url: https://opensubsonic.netlify.app/docs/endpoints/hls/
      operationId: postHls.m3u8
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postHls_m3u8_request"
        required: true
      responses:
        "200":
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string
            text/xml:
              schema:
                description: "Error response TODO: TO BE DESCRIBED"
                type: object
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Downloads a given media file (HLS).
