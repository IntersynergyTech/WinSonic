        format:
          description: "(Since 1.6.0) Specifies the preferred target format (e.g.,\
            \ “mp3” or “flv”) in case there are multiple applicable transcodings.\
            \ Starting with 1.9.0 you can use the special value “raw” to disable transcoding."
          type: string
        timeOffset:
          description: "By default only applicable to video streaming. If specified,\
            \ start streaming at the given offset (in seconds) into the media. The\
            \ `Transcode Offset` extension enables the parameter to music too."
          minimum: 0
          type: integer
        size:
          description: "(Since 1.6.0) Only applicable to video streaming. Requested\
            \ video size specified as WxH, for instance “640x480”."
          pattern: "^[0-9]+x[0-9]+$"
          type: string
        estimateContentLength:
          default: false
          description: "(Since 1.8.0). If set to “true”, the Content-Length HTTP header\
            \ will be set to an estimated value for transcoded or downsampled media."
          type: boolean
        converted:
          default: false
          description: "(Since 1.14.0) Only applicable to video streaming. Servers\
            \ can optimize videos for streaming by converting them to MP4. If a conversion\
            \ exists for the video in question, then setting this parameter to “true”\
            \ will cause the converted video to be returned instead of the original."
          type: boolean
      required:
      - id
      type: object
    postUnstar_request:
      properties:
        id:
          description: The ID of the file (song) or folder (album/artist) to unstar.
            Multiple parameters allowed.
          type: object
        albumId:
          description: The ID of an album to unstar. Use this rather than `id` if
            the client accesses the media collection according to ID3 tags rather
            than file structure. Multiple parameters allowed.
          type: object
        artistId:
          description: The ID of an artist to unstar. Use this rather than `id` if
            the client accesses the media collection according to ID3 tags rather
            than file structure. Multiple parameters allowed.
          type: object
      type: object
    postUpdateInternetRadioStation_request:
      properties:
        id:
          description: The ID of the station.
          type: string
        streamUrl:
          description: The stream URL for the station.
          type: string
        name:
          description: The user-defined name for the station.
          type: string
        homepageUrl:
          description: The home page URL for the station.
          type: string
      required:
      - id
      - name
      - streamUrl
      type: object
    postUpdatePlaylist_request:
      properties:
        playlistId:
          description: The playlist ID.
          type: string
        name:
          description: The human-readable name of the playlist.
          type: string
        comment:
          description: The playlist comment.
          type: string
        public:
          description: "`true` if the playlist should be visible to all users, `false`\
            \ otherwise."
          type: boolean
        songIdToAdd:
          description: Add this song with this ID to the playlist. Multiple parameters
            allowed.
          items:
            type: string
          type: array
        songIndexToRemove:
          description: Remove the song at this position in the playlist. Multiple
            parameters allowed.
          items:
            type: integer
          type: array
      required:
      - playlistId
      type: object
    postUpdateShare_request:
      properties:
        id:
          description: ID of the share to update.
          type: string
        description:
          description: A user-defined description that will be displayed to people
            visiting the shared media.
          type: string
        expires:
          description: "The time at which the share expires. Given as milliseconds\
            \ since 1970, or zero to remove the expiration."
          minimum: 0
          type: integer
      required:
      - id
      type: object
    postUpdateUser_request:
      properties:
        username:
          description: The name of the user.
          type: string
        password:
          description: "The password of the user, either in clear text or hex-encoded."
          type: string
        email:
          description: The email address of the user.
          type: string
        ldapAuthenticated:
          default: false
          description: Whether the user is authenticated in LDAP.
          type: boolean
        adminRole:
          default: false
          description: Whether the user is an administrator.
          type: boolean
        settingsRole:
          default: true
          description: Whether the user is allowed to change personal settings and
            password.
          type: boolean
        streamRole:
          default: true
          description: Whether the user is allowed to play files.
          type: boolean
        jukeboxRole:
          default: false
          description: Whether the user is allowed to play files in jukebox mode.
          type: boolean
        downloadRole:
          default: false
          description: Whether the user is allowed to download files.
          type: boolean
        uploadRole:
          default: false
          description: Whether the user is allowed to upload files.
          type: boolean
        coverArtRole:
          default: false
          description: Whether the user is allowed to change cover art and tags.
          type: boolean
        commentRole:
          default: false
          description: Whether the user is allowed to create and edit comments and
            ratings.
          type: boolean
        podcastRole:
          default: false
          description: Whether the user is allowed to administrate Podcasts.
          type: boolean
        shareRole:
          default: false
          description: Whether the user is allowed to share files with anyone.
          type: boolean
        videoConversionRole:
          default: false
          description: (Since 1.15.0) Whether the user is allowed to start video conversions.
          type: boolean
        musicFolderId:
          description: (Since 1.12.0) IDs of the music folders the user is allowed
            access to. Include the parameter once for each folder.
          items:
            type: string
          type: array
        maxBitRate:
          description: "(Since 1.13.0) The maximum bit rate (in Kbps) for the user.\
            \ Audio streams of higher bit rates are automatically downsampled to this\
            \ bit rate. Legal values: 0 (no limit), 32, 40, 48, 56, 64, 80, 96, 112,\
            \ 128, 160, 192, 224, 256, 320."
          enum:
          - 0
          - 32
          - 40
          - 48
          - 56
          - 64
          - 80
          - 96
          - 112
          - 128
          - 160
          - 192
          - 224
          - 256
          - 320
          type: integer
      required:
      - password
      - username
      type: object
