  /rest/jukeboxControl:
    get:
      description: "Controls the jukebox, i.e., playback directly on the server’s\
        \ audio hardware. Note: The user must be authorized to control the jukebox\
        \ (see Settings > Users > User is allowed to play files in jukebox mode)."
      externalDocs:
        description: jukeboxControl
        url: https://opensubsonic.netlify.app/docs/endpoints/jukeboxcontrol/
      operationId: jukeboxControl
      parameters:
      - description: "The operation to perform. Must be one of: get, status (since\
          \ 1.7.0), set (since 1.7.0), start, stop, skip, add, clear, remove, shuffle,\
          \ setGain"
        in: query
        name: action
        required: true
        schema:
          $ref: "#/components/schemas/JukeboxAction"
      - description: Used by `skip` and `remove`. Zero-based index of the song to
          skip to or remove.
        in: query
        name: index
        required: false
        schema:
          minimum: 0
          type: integer
      - description: (Since 1.7.0) Used by `skip`. Start playing this many seconds
          into the track.
        in: query
        name: offset
        required: false
        schema:
          minimum: 0
          type: integer
      - description: "Used by `add` and `set`. ID of song to add to the jukebox playlist.\
          \ Use multiple id parameters to add many songs in the same request. (set\
          \ is similar to a clear followed by a add, but will not change the currently\
          \ playing track.)"
        explode: true
        in: query
        name: id
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Used by `setGain` to control the playback volume. A float value
          between 0.0 and 1.0.
        in: query
        name: gain
        required: false
        schema:
          format: float
          maximum: 1.0
          minimum: 0.0
          type: number
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JukeboxControlResponse"
          description: Successful or failed response
      summary: "Controls the jukebox, i.e., playback directly on the server’s audio\
        \ hardware."
      tags:
      - Jukebox
    post:
      description: |-
        Controls the jukebox, i.e., playback directly on the server’s audio hardware. Note: The user must be authorized to control the jukebox (see Settings > Users > User is allowed to play files in jukebox mode).

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: jukeboxControl
        url: https://opensubsonic.netlify.app/docs/endpoints/jukeboxcontrol/
      operationId: postJukeboxControl
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
