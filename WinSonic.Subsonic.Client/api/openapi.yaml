  /rest/scrobble:
    get:
      description: |-
        Registers the local playback of one or more media files. Typically used when playing media that is cached on the client. This operation includes the following:

        * “Scrobbles” the media files on last.fm if the user has configured his/her last.fm credentials on the server.
        * Updates the play count and last played timestamp for the media files. (Since 1.11.0)
        * Makes the media files appear in the “Now playing” page in the web app, and appear in the list of songs returned by getNowPlaying (Since 1.11.0)

        Since 1.8.0 you may specify multiple id (and optionally time) parameters to scrobble multiple files.
      externalDocs:
        description: scrobble
        url: https://opensubsonic.netlify.app/docs/endpoints/scrobble/
      operationId: scrobble
      parameters:
      - description: A string which uniquely identifies the file to scrobble.
        in: query
        name: id
        required: true
        schema:
          type: string
      - description: (Since 1.8.0) The time (in milliseconds since 1 Jan 1970) at
          which the song was listened to.
        in: query
        name: time
        required: false
        schema:
          minimum: 0
          type: integer
      - description: Whether this is a “submission” or a “now playing” notification.
        in: query
        name: submission
        required: false
        schema:
          default: true
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
      summary: Registers the local playback of one or more media files.
      tags:
      - Media Annotation
    post:
      description: |-
        Registers the local playback of one or more media files. Typically used when playing media that is cached on the client. This operation includes the following:

        * “Scrobbles” the media files on last.fm if the user has configured his/her last.fm credentials on the server.
        * Updates the play count and last played timestamp for the media files. (Since 1.11.0)
        * Makes the media files appear in the “Now playing” page in the web app, and appear in the list of songs returned by getNowPlaying (Since 1.11.0)

        Since 1.8.0 you may specify multiple id (and optionally time) parameters to scrobble multiple files.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      externalDocs:
        description: scrobble
        url: https://opensubsonic.netlify.app/docs/endpoints/scrobble/
      operationId: postScrobble
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postScrobble_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicResponse"
          description: Successful or failed response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Registers the local playback of one or more media files.
      tags:
      - Media Annotation
