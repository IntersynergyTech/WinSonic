          type: integer
      - description: The list offset. Useful if you for example want to page through
          the list of newest albums.
        in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
      - description: Required if `type=='byYear'`. The first year in the range. If
