  /rest/stream:
    get:
      description: |-
        Streams a given media file.

        OpenSubsonic servers must not count access to this endpoint as a play and increase playcount. Clients can use the Scrobble endpoint to indicate that a media is played ensuring proper data in all cases.

        If the server support the Transcode Offet extension, then it must accept the timeOffset parameter for music too.
      externalDocs:
        description: stream
        url: https://opensubsonic.netlify.app/docs/endpoints/stream/
      operationId: stream
      parameters:
      - description: A string which uniquely identifies the file to stream. Obtained
          by calls to getMusicDirectory.
        in: query
        name: id
        required: true
        schema:
          type: string
      - description: "(Since 1.2.0) If specified, the server will attempt to limit\
          \ the bitrate to this value, in kilobits per second. If set to zero, no\
          \ limit is imposed."
        in: query
        name: maxBitRate
        required: false
        schema:
          minimum: 0
          type: integer
      - description: "(Since 1.6.0) Specifies the preferred target format (e.g., “\
          mp3” or “flv”) in case there are multiple applicable transcodings. Starting\
          \ with 1.9.0 you can use the special value “raw” to disable transcoding."
        in: query
        name: format
        required: false
        schema:
          type: string
      - description: "By default only applicable to video streaming. If specified,\
          \ start streaming at the given offset (in seconds) into the media. The `Transcode\
          \ Offset` extension enables the parameter to music too."
        in: query
        name: timeOffset
        required: false
        schema:
          minimum: 0
          type: integer
      - description: "(Since 1.6.0) Only applicable to video streaming. Requested\
          \ video size specified as WxH, for instance “640x480”."
        in: query
        name: size
        required: false
        schema:
          pattern: "^[0-9]+x[0-9]+$"
          type: string
      - description: "(Since 1.8.0). If set to “true”, the Content-Length HTTP header\
          \ will be set to an estimated value for transcoded or downsampled media."
        in: query
        name: estimateContentLength
        required: false
        schema:
          default: false
          type: boolean
      - description: "(Since 1.14.0) Only applicable to video streaming. Servers can\
          \ optimize videos for streaming by converting them to MP4. If a conversion\
          \ exists for the video in question, then setting this parameter to “true”\
          \ will cause the converted video to be returned instead of the original."
        in: query
        name: converted
        required: false
        schema:
          default: false
          type: boolean
      responses:
        "200":
          content:
            application/binary:
              schema:
                format: binary
                type: string
            text/xml:
              schema:
                description: "Error response TODO: TO BE DESCRIBED"
                type: object
          description: Success (binary) or error (xml) response
      summary: Streams a given media file.
      tags:
      - Media Retrieval
      - Clarification
      - Addition
      - Extension
    post:
      description: |-
        Streams a given media file.

        OpenSubsonic servers must not count access to this endpoint as a play and increase playcount. Clients can use the Scrobble endpoint to indicate that a media is played ensuring proper data in all cases.

        If the server supports the Transcode Offset extension, then it must accept the timeOffset parameter for music too.

        Requires OpenSubsonic extension name `formPost` (As returned by `getOpenSubsonicExtensions`)
      operationId: postStream
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/postStream_request"
        required: true
      responses:
        "200":
          content:
            application/binary:
              schema:
                format: binary
                type: string
            text/xml:
              schema:
                description: "Error response TODO: TO BE DESCRIBED"
                type: object
          description: Success (binary) or error (xml) response
        "405":
          description: HTTP form POST (`formPost`) Extension not supported
      summary: Streams a given media file.
      tags:
      - Media Retrieval
      - Clarification
      - Addition
      - Extension
