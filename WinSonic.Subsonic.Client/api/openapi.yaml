        id: id
        name: name
        coverArt: coverArt
        artistImageUrl: artistImageUrl
        albumCount: 4
        starred: 2000-01-23T04:56:07.000+00:00
        musicBrainzId: musicBrainzId
        sortName: sortName
        roles:
