  securitySchemes:
    apiKeyAuth:
      description: "[OS] An API key used for authentication. If specified, `p`, `t`,\
        \ `s` nor `u` can be specified."
      in: query
      name: apiKey
      type: apiKey
    username:
      description: The username.
      in: query
      name: u
      type: apiKey
    legacyPassword:
      description: "The password, either in clear text or hex-encoded with a “enc:”\
        \ prefix. Since 1.13.0 this should only be used for testing purposes. `u`\
        \ must be specified."
      in: query
      name: p
      type: apiKey
    token:
      description: (Since 1.13.0) The authentication token computed as md5(password
        + salt). `u` and `s` must be specified. See https://opensubsonic.netlify.app/docs/api-reference/#authentication
        for details.
      in: query
      name: t
      type: apiKey
    salt:
      description: (Since 1.13.0) A random string (“salt”) used as input for computing
        the password hash. `u` and `t` must be specified. See https://opensubsonic.netlify.app/docs/api-reference/#authentication
        for details.
      in: query
      name: s
      type: apiKey
    protocolVersion:
      description: "The protocol version implemented by the client, i.e., the version\
        \ of the subsonic-rest-api.xsd schema used (see below)."
      in: query
      name: v
      type: apiKey
    clientName:
      description: A unique string identifying the client application.
      in: query
      name: c
      type: apiKey
    format:
      description: "The response format. Must be 'xml' or 'json'. For the purposes\
        \ of this document, only `json` is allowed."
      in: query
      name: f
      type: apiKey

