        url: https://opensubsonic.netlify.app/docs/responses/contributor/
      properties:
        role:
          description: The contributor role.
          type: string
        subRole:
          description: "The subRole for roles that may require it. Ex: The instrument\
            \ for the performer role (TMCL/performer tags). Note: For consistency\
            \ between different tag formats, the TIPL sub roles should be directly\
            \ exposed in the role field."
          type: string
        artist:
          $ref: "#/components/schemas/ArtistID3"
      required:
      - artist
      - role
      type: object
    ReplayGain:
      description: "The replay gain data of a song. Note: If the data is not present\
        \ the field must be ommited in the answer. (But the replayGain field on Child\
        \ must always be present)"
      externalDocs:
        description: Replay Gain
        url: https://opensubsonic.netlify.app/docs/responses/replaygain/
      properties:
        trackGain:
          description: The track replay gain value. (In Db)
          type: number
        albumGain:
          description: The album replay gain value. (In Db)
          type: number
        trackPeak:
          description: The track peak value. (Must be positive)
          minimum: 0
          type: number
        albumPeak:
          description: The album peak value. (Must be positive)
          minimum: 0
          type: number
        baseGain:
